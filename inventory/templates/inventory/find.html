<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Find Box"/>
  <meta name="theme-color" content="#378ADD"/>
  <title>Find a Box</title>
  <link rel="manifest" href="/static/manifest-find.json"/>
  <style>
    :root {
      --blue:        #378ADD;
      --blue-dark:   #185FA5;
      --blue-light:  #E6F1FB;
      --green:       #1D9E75;
      --green-light: #E1F5EE;
      --amber-light: #FEF3CD;
      --amber-dark:  #7A5C00;
      --bg:          #ffffff;
      --bg2:         #f5f5f4;
      --border:      #e5e4e0;
      --border2:     #d4d3cf;
      --text:        #1a1a18;
      --text2:       #6b6b66;
      --text3:       #9c9a92;
      --radius:      10px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:   #1a1a18; --bg2: #252522;
        --border: #3d3d3a; --border2: #52524e;
        --text: #f0ede6; --text2: #b0aea6; --text3: #73726c;
        --blue-light: #0d2a4a; --green-light: #0d3d2e; --amber-light: #3d2e00;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; }

    /* Header */
    .hdr { border-bottom: .5px solid var(--border); padding: 18px 20px 0; background: var(--bg); flex-shrink: 0; position: sticky; top: 0; z-index: 10; }
    .hdr-top { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--blue); flex-shrink: 0; }
    .htitle { font-size: 15px; font-weight: 600; letter-spacing: -.2px; }
    .hsub { font-size: 12px; color: var(--text3); margin-left: auto; font-family: 'SF Mono', monospace; }
    .tabs { display: flex; }
    .tab { flex: 1; text-align: center; padding: 9px 0; font-size: 13px; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; user-select: none; }
    .tab.on { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }

    /* Panels */
    .body { flex: 1; overflow-y: auto; }
    .panel { display: none; }
    .panel.on { display: block; }

    /* Search bar */
    .sbar { padding: 12px 20px; border-bottom: .5px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 5; }
    .swrap { position: relative; display: flex; align-items: center; }
    .sico { position: absolute; left: 13px; width: 15px; height: 15px; color: var(--text3); pointer-events: none; }
    .sinput { width: 100%; font-family: inherit; font-size: 15px; color: var(--text); background: var(--bg2); border: .5px solid var(--border); border-radius: 99px; padding: 10px 36px 10px 38px; outline: none; transition: border-color .15s; }
    .sinput:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(55,138,221,.12); background: var(--bg); }
    .sinput::placeholder { color: var(--text3); }
    .clr { position: absolute; right: 12px; width: 18px; height: 18px; border-radius: 50%; background: var(--border2); display: none; align-items: center; justify-content: center; cursor: pointer; font-size: 10px; color: var(--text2); border: none; font-family: inherit; }

    /* Empty states */
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 56px 24px; gap: 8px; text-align: center; }
    .eico { width: 44px; height: 44px; border-radius: 50%; background: var(--bg2); display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
    .etitle { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .esub { font-size: 13px; color: var(--text3); line-height: 1.5; }

    /* Count */
    .cnt { font-size: 11px; color: var(--text3); padding: 10px 20px 4px; font-family: 'SF Mono', monospace; }

    /* Result items */
    .ritem { padding: 13px 20px; border-bottom: .5px solid var(--border); cursor: pointer; transition: background .1s; }
    .ritem:hover { background: var(--bg2); }
    .ritem:last-child { border-bottom: none; }
    .rlabel { font-size: 15px; font-weight: 600; letter-spacing: -.1px; margin-bottom: 3px; }
    .rlabel mark { background: #B5D4F4; color: #185FA5; border-radius: 3px; padding: 0 1px; font-weight: 600; }
    .rpath { font-size: 12px; color: var(--text3); font-family: 'SF Mono', monospace; margin-bottom: 2px; }
    .rcat { font-size: 11px; color: var(--text3); }
    .rnotes { font-size: 12px; color: var(--text2); margin-top: 2px; }

    /* Browse sub-tabs */
    .btabs { display: flex; border-bottom: .5px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 5; }
    .btab { flex: 1; text-align: center; padding: 10px 0; font-size: 12px; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; }
    .btab.on { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }
    .bpanel { display: none; } .bpanel.on { display: block; }

    /* Browse chips */
    .bsec { padding: 14px 20px 8px; }
    .bseclabel { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
    .chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip { font-size: 13px; padding: 6px 13px; border-radius: 99px; border: .5px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; transition: all .12s; white-space: nowrap; font-family: inherit; }
    .chip:hover { border-color: var(--blue); color: var(--blue-dark); background: var(--blue-light); }
    .chip.on { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 600; }
    .bdiv { height: .5px; background: var(--border); }

    /* Detail overlay */
    .overlay { display: none; position: fixed; inset: 0; background: var(--bg); flex-direction: column; z-index: 20; overflow-y: auto; }
    .ohdr { padding: 14px 20px; border-bottom: .5px solid var(--border); display: flex; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 2; }
    .back { background: none; border: none; padding: 0; cursor: pointer; color: var(--blue); font-family: inherit; font-size: 14px; display: flex; align-items: center; gap: 4px; }
    .obody { padding: 20px 20px 40px; display: flex; flex-direction: column; gap: 18px; }
    .box-label { font-size: 21px; font-weight: 700; letter-spacing: -.3px; line-height: 1.2; }
    .card { background: var(--bg2); border-radius: var(--radius); padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
    .crow { display: flex; flex-direction: column; gap: 4px; }
    .clabel { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text3); }
    .cdiv { height: .5px; background: var(--border); }
    .pv { display: flex; flex-direction: column; }
    .pnode { display: flex; align-items: center; gap: 10px; padding: 5px 0; }
    .pdot { width: 8px; height: 8px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
    .pdot.last { background: var(--blue); }
    .pline { width: 1px; height: 10px; background: var(--border); margin-left: 3.5px; }
    .ptext { font-size: 13px; color: var(--text2); font-family: 'SF Mono', monospace; }
    .ptext.last { font-size: 14px; font-weight: 600; color: var(--text); font-family: inherit; }
    .badge { display: inline-flex; align-items: center; gap: 6px; background: var(--bg); border: .5px solid var(--border2); border-radius: 99px; padding: 5px 12px; font-size: 12px; color: var(--text2); }
    .bdot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); flex-shrink: 0; }

    /* Contents / audit */
    .clabel2 { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
    .clist { border: .5px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--bg); }
    .crow2 { padding: 11px 14px; border-bottom: .5px solid var(--border); font-size: 14px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: background .1s; user-select: none; }
    .crow2:hover { background: var(--bg2); }
    .crow2:last-child { border-bottom: none; }
    .crow2.ticked { color: var(--text3); }
    .tick { font-size: 16px; color: var(--border2); flex-shrink: 0; transition: color .15s; }
    .crow2.ticked .tick { color: var(--green); }
    .asum { border-radius: var(--radius); padding: 11px 14px; font-size: 13px; display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .asum.all { background: var(--green-light); color: #0F6E56; }
    .asum.partial { background: var(--amber-light); color: var(--amber-dark); }
    .cempty { padding: 14px; font-size: 13px; color: var(--text3); text-align: center; }
  </style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="dot"></div>
    <span class="htitle">Find a box</span>
    <span class="hsub">retriever</span>
  </div>
  <div class="tabs">
    <div class="tab on" data-t="search">Search</div>
    <div class="tab" data-t="browse">Browse</div>
  </div>
</div>

<div class="body">

  <!-- SEARCH PANEL -->
  <div class="panel on" id="p-search">
    <div class="sbar">
      <div class="swrap">
        <svg class="sico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="17" y2="17"/></svg>
        <input class="sinput" id="sinput" type="search" placeholder="chickpeas, cables, duvet…" autocomplete="off"/>
        <button class="clr" id="clr">✕</button>
      </div>
    </div>
    <div class="empty" id="s-empty">
      <div class="eico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="color:var(--text3)"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
      <div class="etitle">What are you looking for?</div>
      <div class="esub">Type any word from the box label,<br>category, or notes</div>
    </div>
    <div class="cnt" id="s-cnt" style="display:none"></div>
    <div id="s-results"></div>
    <div class="empty" id="s-none" style="display:none">
      <div class="eico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="color:var(--text3)"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div>
      <div class="etitle" id="s-none-title">Nothing found</div>
      <div class="esub">Ask whoever stored it to log it<br>in the Updater app.</div>
    </div>
  </div>

  <!-- BROWSE PANEL -->
  <div class="panel" id="p-browse">
    <div class="btabs">
      <div class="btab on" data-bt="location">By location</div>
      <div class="btab" data-bt="category">By category</div>
    </div>

    <!-- By location -->
    <div class="bpanel on" id="bp-location">
      <div class="bsec"><div class="bseclabel">Room</div><div class="chips" id="br-rooms"></div></div>
      <div id="br-furn-s" style="display:none"><div class="bdiv"></div><div class="bsec"><div class="bseclabel">Furniture</div><div class="chips" id="br-furn"></div></div></div>
      <div id="br-shelf-s" style="display:none"><div class="bdiv"></div><div class="bsec"><div class="bseclabel">Shelf</div><div class="chips" id="br-shelf"></div></div></div>
      <div class="bdiv" id="br-loc-div" style="display:none"></div>
      <div id="br-loc-res"></div>
    </div>

    <!-- By category -->
    <div class="bpanel" id="bp-category">
      <div class="bsec"><div class="bseclabel">Type</div><div class="chips" id="br-super"></div></div>
      <div id="br-mid-s" style="display:none"><div class="bdiv"></div><div class="bsec"><div class="bseclabel">Group</div><div class="chips" id="br-mid"></div></div></div>
      <div id="br-cat-s" style="display:none"><div class="bdiv"></div><div class="bsec"><div class="bseclabel">Category</div><div class="chips" id="br-cat"></div></div></div>
      <div class="bdiv" id="br-cat-div" style="display:none"></div>
      <div id="br-cat-res"></div>
    </div>
  </div>

</div>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="overlay">
  <div class="ohdr">
    <button class="back" id="back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
  </div>
  <div class="obody" id="obody"></div>
</div>

<script>
const BASE = '';

let LOC_DATA = [];
let CAT_DATA = [];

// ── Load data ─────────────────────────────────────────────────────────────────

async function loadData() {
  try {
    const [lr, cr] = await Promise.all([
      fetch(BASE + '/inventory/api/locations'),
      fetch(BASE + '/inventory/api/categories'),
    ]);
    LOC_DATA = await lr.json();
    CAT_DATA = await cr.json();
    renderRooms();
    renderSuper();
  } catch(e) { console.error('Load failed:', e); }
}

// ── Tabs ──────────────────────────────────────────────────────────────────────

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(x => x.classList.remove('on'));
  t.classList.add('on');
  document.getElementById('p-' + t.dataset.t).classList.add('on');
}));

document.querySelectorAll('.btab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.btab').forEach(x => x.classList.remove('on'));
  document.querySelectorAll('.bpanel').forEach(x => x.classList.remove('on'));
  t.classList.add('on');
  document.getElementById('bp-' + t.dataset.bt).classList.add('on');
}));

// ── Search ────────────────────────────────────────────────────────────────────

const si = document.getElementById('sinput');
const clr = document.getElementById('clr');
let searchTimer;

si.addEventListener('input', () => {
  const q = si.value.trim();
  clr.style.display = q ? 'flex' : 'none';
  clearTimeout(searchTimer);
  if (!q) { clearSearch(); return; }
  searchTimer = setTimeout(() => doSearch(q), 250);
});

clr.addEventListener('click', () => {
  si.value = ''; clr.style.display = 'none'; clearSearch(); si.focus();
});

function clearSearch() {
  show('s-empty'); hide('s-none');
  document.getElementById('s-results').innerHTML = '';
  document.getElementById('s-cnt').style.display = 'none';
}

async function doSearch(q) {
  try {
    const res  = await fetch(BASE + `/inventory/api/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    hide('s-empty');
    const re = document.getElementById('s-results');
    re.innerHTML = '';

    if (!data.length) {
      show('s-none');
      document.getElementById('s-none-title').textContent = `Nothing matching "${q}"`;
      document.getElementById('s-cnt').style.display = 'none';
      return;
    }

    hide('s-none');
    document.getElementById('s-cnt').style.display = 'block';
    document.getElementById('s-cnt').textContent = data.length === 1 ? '1 box found' : `${data.length} boxes found`;

    data.forEach(b => {
      const d = document.createElement('div');
      d.className = 'ritem';
      const catStr = b.categories.length
        ? b.categories.map(c => [c.super_category, c.mid_category, c.category].filter(Boolean).join(' › ')).join(', ')
        : '';
      d.innerHTML = `
        <div class="rlabel">${hl(b.label, q)}</div>
        <div class="rpath">${b.location}</div>
        ${catStr ? `<div class="rcat">${catStr}</div>` : ''}
        ${b.notes ? `<div class="rnotes">${hl(b.notes, q)}</div>` : ''}
      `;
      d.addEventListener('click', () => showDetail(b, q));
      re.appendChild(d);
    });
  } catch(e) { console.error(e); }
}

function hl(text, q) {
  if (!q) return text;
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i === -1) return text;
  return text.slice(0, i) + '<mark>' + text.slice(i, i + q.length) + '</mark>' + text.slice(i + q.length);
}

// ── Browse by location ────────────────────────────────────────────────────────

let ls = { room_id: null, furn_id: null };

function renderRooms() {
  const el = document.getElementById('br-rooms');
  el.innerHTML = LOC_DATA.map(r =>
    `<button class="chip" data-id="${r.id}" data-name="${r.name}">${r.name}</button>`
  ).join('');
  el.querySelectorAll('.chip').forEach(c =>
    c.addEventListener('click', () => selRoom(c))
  );
}

function selRoom(chip) {
  ls = { room_id: parseInt(chip.dataset.id), furn_id: null };
  hlChip('br-rooms', chip.dataset.name);
  const room = LOC_DATA.find(r => r.id == chip.dataset.id);
  mkChips('br-furn', room.furniture, selFurn);
  show('br-furn-s'); hide('br-shelf-s');
  hide('br-loc-div'); document.getElementById('br-loc-res').innerHTML = '';
}

function selFurn(chip) {
  ls.furn_id = parseInt(chip.dataset.id);
  hlChip('br-furn', chip.dataset.name);
  const room = LOC_DATA.find(r => r.id === ls.room_id);
  const furn = room.furniture.find(f => f.id == chip.dataset.id);
  mkChips('br-shelf', furn.shelves, selShelf);
  show('br-shelf-s');
  hide('br-loc-div'); document.getElementById('br-loc-res').innerHTML = '';
}

async function selShelf(chip) {
  hlChip('br-shelf', chip.dataset.name);
  try {
    const res  = await fetch(BASE + `/inventory/api/location/${chip.dataset.id}/boxes`);
    const data = await res.json();
    showBrowseResults('br-loc-res', 'br-loc-div', data, 'location');
  } catch(e) { console.error(e); }
}

// ── Browse by category ────────────────────────────────────────────────────────

let cs = { super_id: null, mid_id: null };

function renderSuper() {
  const el = document.getElementById('br-super');
  el.innerHTML = CAT_DATA.map(sc =>
    `<button class="chip" data-id="${sc.id}" data-name="${sc.name}">${sc.name}</button>`
  ).join('');
  el.querySelectorAll('.chip').forEach(c =>
    c.addEventListener('click', () => selSuper(c))
  );
}

function selSuper(chip) {
  cs = { super_id: parseInt(chip.dataset.id), mid_id: null };
  hlChip('br-super', chip.dataset.name);
  const sc = CAT_DATA.find(s => s.id == chip.dataset.id);
  hide('br-cat-s'); hide('br-cat-div');
  document.getElementById('br-cat-res').innerHTML = '';

  if (sc.flat) {
    hide('br-mid-s');
    if (sc.categories.length === 1) {
      fetchCatBoxes(sc.categories[0].id); return;
    }
    mkChips('br-cat', sc.categories, selCat);
    show('br-cat-s');
  } else {
    mkChips('br-mid', sc.mid_categories, selMid);
    show('br-mid-s');
  }
}

function selMid(chip) {
  cs.mid_id = parseInt(chip.dataset.id);
  hlChip('br-mid', chip.dataset.name);
  const sc = CAT_DATA.find(s => s.id === cs.super_id);
  const mc = sc.mid_categories.find(m => m.id == chip.dataset.id);
  mkChips('br-cat', mc.categories, selCat);
  show('br-cat-s');
  hide('br-cat-div'); document.getElementById('br-cat-res').innerHTML = '';
}

function selCat(chip) {
  hlChip('br-cat', chip.dataset.name);
  fetchCatBoxes(parseInt(chip.dataset.id));
}

async function fetchCatBoxes(catId) {
  try {
    const res  = await fetch(BASE + `/inventory/api/category/${catId}/boxes`);
    const data = await res.json();
    showBrowseResults('br-cat-res', 'br-cat-div', data, 'category');
  } catch(e) { console.error(e); }
}

// ── Browse results ────────────────────────────────────────────────────────────

function showBrowseResults(resId, divId, boxes, mode) {
  const el = document.getElementById(resId);
  document.getElementById(divId).style.display = 'block';
  el.innerHTML = '';

  if (!boxes.length) {
    el.innerHTML = `<div class="empty" style="padding:28px 24px"><div class="etitle" style="font-size:14px">No boxes here</div><div class="esub">Nothing logged at this ${mode} yet.</div></div>`;
    return;
  }

  const cd = document.createElement('div');
  cd.className = 'cnt';
  cd.textContent = boxes.length === 1 ? '1 box' : `${boxes.length} boxes`;
  el.appendChild(cd);

  boxes.forEach(b => {
    const d = document.createElement('div');
    d.className = 'ritem';
    const subtitle = mode === 'location' ? b.categories.map(c => c.category).join(', ') : b.location;
    const catStr   = mode === 'location' ? '' : b.categories.map(c => c.category).join(', ');
    d.innerHTML = `
      <div class="rlabel">${b.label}</div>
      <div class="rpath">${subtitle}</div>
      ${catStr ? `<div class="rcat">${catStr}</div>` : ''}
    `;
    d.addEventListener('click', () => showDetail(b, ''));
    el.appendChild(d);
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function mkChips(id, items, handler) {
  const el = document.getElementById(id);
  el.innerHTML = items.map(i =>
    `<button class="chip" data-id="${i.id}" data-name="${i.name}">${i.name}</button>`
  ).join('');
  el.querySelectorAll('.chip').forEach(c =>
    c.addEventListener('click', () => { hlChip(id, c.dataset.name); handler(c); })
  );
}

function hlChip(id, val) {
  document.querySelectorAll(`#${id} .chip`).forEach(c =>
    c.classList.toggle('on', c.dataset.name === val)
  );
}

function show(id) { document.getElementById(id).style.display = 'block'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

// ── Detail ────────────────────────────────────────────────────────────────────

function showDetail(b, q) {
  const path     = b.location.split(' > ');
  const catBadges = b.categories.map(c =>
    `<div class="badge"><div class="bdot"></div>${[c.super_category, c.mid_category, c.category].filter(Boolean).join(' › ')}</div>`
  ).join('<br style="margin:4px 0">');

  document.getElementById('obody').innerHTML = `
    <div class="box-label">${b.label}</div>

    <div class="card">
      <div class="crow">
        <span class="clabel">Location</span>
        <div class="pv">
          ${path.map((p, i) => `
            <div class="pnode">
              <div class="pdot ${i === path.length - 1 ? 'last' : ''}"></div>
              <span class="ptext ${i === path.length - 1 ? 'last' : ''}">${p}</span>
            </div>
            ${i < path.length - 1 ? '<div class="pline"></div>' : ''}
          `).join('')}
        </div>
      </div>

      ${b.categories.length ? `
        <div class="cdiv"></div>
        <div class="crow">
          <span class="clabel">Categories</span>
          <div style="display:flex;flex-direction:column;gap:6px;margin-top:2px">${catBadges}</div>
        </div>` : ''}

      ${b.notes ? `
        <div class="cdiv"></div>
        <div class="crow">
          <span class="clabel">Notes</span>
          <span style="font-size:13px">${b.notes}</span>
        </div>` : ''}
      ${b.coord && b.coord.label ? `
        <div class="cdiv"></div>
        <div class="crow">
          <span class="clabel">Position</span>
          <span style="font-size:13px;font-family:'SF Mono',monospace">${b.coord.label}</span>
        </div>` : ''}

      <div class="cdiv"></div>
      <div class="crow">
        <span class="clabel">Last updated</span>
        <span style="font-size:13px;color:var(--text2);font-family:'SF Mono',monospace">${b.updated_by || '—'} · ${b.updated_at ? b.updated_at.slice(0,10) : '—'}</span>
      </div>
    </div>

    <div>
      <div class="clabel2">Contents — tap to audit</div>
      ${b.categories.length
        ? `<div class="clist" id="clist">
            ${b.categories.map((c, i) => `
              <div class="crow2" data-i="${i}" onclick="tick(this)">
                <span>${q ? hl(c.category, q) : c.category}</span>
                <span class="tick">○</span>
              </div>`).join('')}
           </div>
           <div id="asum" style="display:none"></div>`
        : `<div class="clist"><div class="cempty">No categories logged for this box.</div></div>`
      }
    </div>
  `;

  document.getElementById('overlay').style.display = 'flex';
}

function tick(row) {
  const ticked = row.classList.toggle('ticked');
  row.querySelector('.tick').textContent = ticked ? '✓' : '○';
  const rows   = document.querySelectorAll('#clist .crow2');
  const total  = rows.length;
  const done   = document.querySelectorAll('#clist .crow2.ticked').length;
  const asum   = document.getElementById('asum');
  if (!done) { asum.style.display = 'none'; return; }
  asum.style.display = 'flex';
  if (done === total) {
    asum.className   = 'asum all';
    asum.textContent = `✓ All ${total} categories confirmed present`;
  } else {
    asum.className   = 'asum partial';
    asum.textContent = `${done} of ${total} confirmed — ${total - done} not yet checked`;
  }
}

document.getElementById('back').addEventListener('click', () => {
  document.getElementById('overlay').style.display = 'none';
});

// ── Init ──────────────────────────────────────────────────────────────────────
loadData();
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js');
  }
</script>
</body>
</html>
